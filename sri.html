<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open The Heart ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff416c,#6a11cb);
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:white;
}

h1{
    margin-bottom:40px;
}

.heart{
    font-size:120px;
    cursor:pointer;
    animation:beat 1s infinite;
    transition:0.3s;
}

.heart:hover{
    transform:scale(1.2);
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

#letter{
    display:none;
    margin-top:30px;
    width:320px;
    background:white;
    color:#333;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    animation:show 1s;
    text-align:center;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<h1>❤️ Open My Heart ❤️</h1>

<div class="heart" onclick="openHeart()">❤️</div>

<div id="letter">
<h2>💌 A Small Surprise</h2>

<p>
This is the first website I made...<br><br>
Idhu unakaaga na panna oru chinna website di ❤️<br><br>
Thank you my solace and my everything ❤️‍🩹🌸
</p>

</div>

<script>

function openHeart(){

document.querySelector(".heart").style.display="none";

document.getElementById("letter").style.display="block";

}

// ❤️ Floating Hearts Animation
setInterval(() => {

    const heart = document.createElement("div");

    heart.innerHTML = "❤️";

    heart.style.position = "fixed";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.bottom = "-50px";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    heart.style.pointerEvents = "none";
    heart.style.zIndex = "9999";
    heart.style.transition = "all 5s linear";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.style.transform =
            "translateY(-110vh) rotate(" + (Math.random() * 360) + "deg)";
        heart.style.opacity = "0";
    }, 50);

    setTimeout(() => {
        heart.remove();
    }, 5000);

}, 300);

</script>

</body>
</html>
